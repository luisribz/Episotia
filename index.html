<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0c11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Episotia">
<title>Episotia</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon-v3.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192-v3.png">
<style>
:root{
  --bg:#0a0c11; --bg2:#12151e; --bg3:#1a1e2a; --bg4:#222738; --line:#242a3a; --line2:#303752;
  --tx:#f0f2f8; --tx2:#9aa2b8; --tx3:#5d6478;
  --acc:#8b7cf8; --acc-2:#c084fc; --grad:linear-gradient(135deg,#8b7cf8,#c084fc);
  --green:#34d399; --red:#fb7185; --gold:#fbbf24;
  --hdrbg:rgba(10,12,17,.85); --navbg:rgba(13,15,22,.88); --toastbg:#252b3d;
  --rad:16px; --rad-s:10px;
  --sab:env(safe-area-inset-bottom,0px); --sat:env(safe-area-inset-top,0px);
  --shadow:0 4px 16px rgba(0,0,0,.35);
  color-scheme:dark;
}
html[data-theme="light"]{
  --bg:#f3f4f9; --bg2:#ffffff; --bg3:#e9ebf3; --bg4:#dde1ee; --line:#e3e6f0; --line2:#c6cde0;
  --tx:#171923; --tx2:#525a70; --tx3:#8f96ab;
  --hdrbg:rgba(243,244,249,.85); --navbg:rgba(248,249,252,.92); --toastbg:#ffffff;
  --shadow:0 4px 14px rgba(30,35,60,.08);
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overscroll-behavior-y:none}
body{
  background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  font-size:15px;line-height:1.45;min-height:100%;
  padding-bottom:calc(76px + var(--sab));
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  transition:background .2s;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;user-select:none;-webkit-user-select:none}
input,select{font:inherit}
input{font-size:16px} /* prevents iOS focus zoom */
img{display:block}
svg{display:block}
.hidden{display:none!important}
::selection{background:rgba(139,124,248,.35)}

/* ── header ─────────────────────────────── */
header{
  position:sticky;top:0;z-index:40;
  background:var(--hdrbg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
  padding:calc(12px + var(--sat)) 18px 12px;
  display:flex;align-items:center;gap:12px;
}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{
  width:30px;height:30px;border-radius:9px;background:#12151e;
  display:flex;align-items:center;justify-content:center;
  border:1px solid #242a3a;
  box-shadow:0 2px 10px rgba(139,124,248,.25);
}
.logo-mark svg{width:19px;height:19px}
.logo h1{
  font-size:18px;font-weight:800;letter-spacing:-.2px;
  background:linear-gradient(135deg,var(--tx),var(--acc));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hbtns{margin-left:auto;display:flex;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);transition:transform .12s,background .12s;
}
.icon-btn svg{width:18px;height:18px;stroke:var(--tx2);stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:active{transform:scale(.9);background:var(--bg4)}
#sync-pill{display:none;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--tx2);font-weight:600}
#sync-pill.on{display:flex}
.spin{width:11px;height:11px;border:2px solid var(--acc);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── bottom nav ─────────────────────────── */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:var(--navbg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
  display:flex;padding:6px 8px calc(6px + var(--sab));
}
nav button{
  flex:1;padding:7px 0 5px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.2px;border-radius:12px;
  position:relative;transition:color .15s;
}
nav button svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
nav button.act{color:var(--acc)}
nav button.act svg{transform:translateY(-1px)}
nav button.act::before{content:"";position:absolute;top:-7px;width:24px;height:3px;border-radius:0 0 3px 3px;background:var(--grad)}
nav .badge{
  position:absolute;top:2px;left:calc(50% + 6px);
  background:var(--red);color:#fff;font-size:9px;font-weight:800;
  border-radius:9px;padding:1.5px 5.5px;box-shadow:0 0 0 2.5px var(--bg);
}

main{max-width:640px;margin:0 auto;padding:16px 16px 30px;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin:22px 2px 10px;font-weight:800}
.empty{text-align:center;color:var(--tx3);padding:64px 24px;font-size:14px;line-height:1.7}
.empty .big{font-size:44px;margin-bottom:14px;filter:grayscale(.3);opacity:.9}

/* ── chips ──────────────────────────────── */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;background:var(--bg3);border:1px solid var(--line);color:var(--tx2);
  border-radius:20px;padding:7px 15px;font-size:13px;font-weight:600;transition:all .15s;
}
.chip:active{transform:scale(.95)}
.chip.act{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 2px 10px rgba(139,124,248,.35)}
.chip.gold.act{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#151209;box-shadow:0 2px 10px rgba(251,191,36,.35)}

/* ── cards ──────────────────────────────── */
.card{
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);
  display:flex;gap:13px;padding:11px;margin-bottom:11px;align-items:center;
  box-shadow:var(--shadow);
  transition:transform .18s ease;
}
.card.swipeable{touch-action:pan-y;will-change:transform}
.card.dragging{transition:none}
.swipe-wrap{position:relative;margin-bottom:11px}
.swipe-wrap .card{margin-bottom:0;position:relative;z-index:1}
.swipe-bg{position:absolute;inset:0;border-radius:var(--rad);display:flex;align-items:center;opacity:0;pointer-events:none}
.swipe-bg svg{width:26px;height:26px;stroke:#0a0c11;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .12s}
.swipe-bg.armed svg{transform:scale(1.3)}
.sb-watch{background:var(--green);justify-content:flex-end;padding-right:24px}
.sb-later{background:var(--gold);justify-content:flex-start;padding-left:24px}
.poster{width:56px;height:80px;border-radius:var(--rad-s);object-fit:cover;background:var(--bg3);flex-shrink:0}
.poster.ph{display:flex;align-items:center;justify-content:center;color:var(--tx3)}
.poster.ph svg{width:22px;height:22px;stroke:var(--tx3);stroke-width:1.6;fill:none}
.card .info{flex:1;min-width:0}
.card .title{font-weight:700;font-size:15px;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.titlefav{display:inline-block;margin-left:6px;vertical-align:-1px}
.titlefav svg{width:13px;height:13px;fill:var(--gold);stroke:none;display:inline}
.card .sub{font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.card .meta{font-size:11.5px;color:var(--tx3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.epcode{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
.check-btn{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:var(--bg3);border:1.5px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.check-btn svg{width:20px;height:20px;stroke:var(--green);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.check-btn:active{background:var(--green);border-color:var(--green);transform:scale(.88)}
.check-btn:active svg{stroke:#0a0c11}
.left-num{font-size:10.5px;color:var(--gold);text-align:center;margin-top:4px;font-weight:700}
.progress{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--grad);border-radius:2px;transition:width .3s}
.progress i.full{background:var(--green)}

/* history rows */
.hrow{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:10px 12px;margin-bottom:9px}
.hrow .hinfo{flex:1;min-width:0}
.hrow .ht{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow .hs{font-size:12.5px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow .hd{font-size:11px;color:var(--gold);font-weight:700;flex-shrink:0;text-align:right;line-height:1.5}
.unmark{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.unmark svg{width:15px;height:15px;stroke:var(--red);stroke-width:2.2;fill:none;stroke-linecap:round}
.unmark:active{transform:scale(.9)}
.hposter{width:40px;height:56px;border-radius:8px;object-fit:cover;background:var(--bg3);flex-shrink:0}

/* ── upcoming ───────────────────────────── */
.daylabel{
  font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.4px;
  margin:20px 2px 10px;display:flex;align-items:baseline;gap:8px;
}
.daylabel::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--gold);align-self:center}
.daylabel small{color:var(--tx3);font-weight:600}

/* ── shows grid ─────────────────────────── */
.searchbar{display:flex;gap:8px;margin-bottom:12px;position:sticky;top:calc(62px + var(--sat));z-index:30;background:var(--bg);padding:8px 0}
.inputwrap{flex:1;position:relative;display:flex}
.inputwrap input{width:100%}
.clearbtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--bg4);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;line-height:1}
.searchbar input{
  flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:14px;
  padding:12px 16px;color:var(--tx);outline:none;transition:border .15s;
}
.searchbar input::placeholder{color:var(--tx3)}
.searchbar input:focus{border-color:var(--acc)}
.searchbar .icon-btn{width:46px;height:46px;border-radius:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:11px}
.gcell{position:relative;border-radius:12px;overflow:hidden;background:var(--bg2);border:1px solid var(--line);transition:transform .12s;box-shadow:var(--shadow)}
.gcell:active{transform:scale(.96)}
.gcell img{width:100%;aspect-ratio:2/3;object-fit:cover}
.gcell .gph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
.gcell .gph svg{width:26px;height:26px;stroke:var(--tx3);stroke-width:1.5;fill:none}
.gcell .gt{font-size:11px;font-weight:600;padding:7px 7px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcell .fav{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:6px;background:rgba(10,12,17,.72);display:flex;align-items:center;justify-content:center}
.gcell .fav svg{width:12px;height:12px;fill:var(--gold);stroke:none}
.gcell .gbar{position:absolute;left:0;right:0;height:3px;background:rgba(0,0,0,.55)}
.gcell .gbar i{display:block;height:100%;background:var(--grad)}
.gcell .gbar i.full{background:var(--green)}

/* ── stats ──────────────────────────────── */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stat-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);
  padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat-card::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:.6}
.stat-card .v{font-size:27px;font-weight:800;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .l{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-top:3px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
.bar-row .bl{width:112px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.bar-row .bt{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-row .bt i{display:block;height:100%;background:var(--grad);border-radius:4px}
.bar-row .bv{width:46px;text-align:right;color:var(--tx2);font-variant-numeric:tabular-nums;font-size:12px;font-weight:600}

/* ── detail sheet ───────────────────────── */
#sheet{position:fixed;inset:0;z-index:60;background:var(--bg);overflow-y:auto;padding-bottom:44px;animation:slideup .22s cubic-bezier(.2,.8,.25,1)}
@keyframes slideup{from{transform:translateY(28px);opacity:0}to{transform:none;opacity:1}}
.hero{position:relative;height:200px;overflow:hidden}
.hero .hbg{position:absolute;inset:-24px;background-size:cover;background-position:center 22%;filter:blur(22px) saturate(1.15) brightness(.75);transform:scale(1.15)}
.hero .hgrad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.22),rgba(0,0,0,.45) 55%,var(--bg))}
.hero .hback{position:absolute;top:calc(12px + var(--sat));left:14px;z-index:3;background:rgba(10,12,17,.55);border-color:rgba(255,255,255,.12)}
.hero .hback svg{stroke:#e8eaf0}
.hero .hfav{position:absolute;top:calc(12px + var(--sat));right:14px;z-index:3;background:rgba(10,12,17,.55);border-color:rgba(255,255,255,.12)}
.hero .hfav svg{fill:none;stroke:#e8eaf0}
.hero .hfav.on svg{fill:var(--gold);stroke:var(--gold)}
.dwrap{max-width:640px;margin:0 auto;padding:0 16px}
.dtop{display:flex;gap:15px;margin-top:-64px;position:relative;z-index:2}
.dtop img,.dtop .dph{width:108px;height:158px;border-radius:14px;object-fit:cover;background:var(--bg3);flex-shrink:0;box-shadow:0 10px 30px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08)}
.dtop .dph{display:flex;align-items:center;justify-content:center}
.dtop .dph svg{width:30px;height:30px;stroke:var(--tx3);stroke-width:1.5;fill:none}
.dhead{padding-top:70px;min-width:0}
.dtitle{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1.2}
.dmeta{font-size:12.5px;color:var(--tx2);margin-top:6px;line-height:1.65}
.dprog{margin-top:18px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:13px 15px}
.dprog .dpr{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--tx2);font-weight:600}
.dprog .dpr b{color:var(--acc);font-size:16px}
.dprog .dpr span:last-child{color:var(--acc);font-weight:800}
.statusrow{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
.actions{display:flex;gap:9px;margin-bottom:18px}
.abtn{
  flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:13px;
  padding:12px;font-size:13.5px;font-weight:700;text-align:center;transition:transform .12s;
}
.abtn:active{transform:scale(.96)}
.abtn.primary{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(139,124,248,.35)}
.season{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow)}
.season-h{display:flex;align-items:center;padding:13px 15px;gap:10px;cursor:pointer}
.season-h .sn{font-weight:800;font-size:14.5px}
.season-h .sc{font-size:12px;color:var(--tx2);margin-left:auto;font-variant-numeric:tabular-nums;font-weight:600}
.season-h .caret{color:var(--tx3);transition:transform .18s;font-size:12px}
.season.open .caret{transform:rotate(90deg)}
.season-mark{font-size:11px;font-weight:800;color:var(--acc);background:rgba(139,124,248,.13);padding:5px 11px;border-radius:14px;letter-spacing:.3px}
.eprow{display:flex;align-items:center;gap:11px;padding:10px 15px;border-top:1px solid var(--line);font-size:13.5px;transition:background .12s}
.eprow:active{background:var(--bg3)}
.eprow .en{color:var(--tx3);font-variant-numeric:tabular-nums;width:30px;flex-shrink:0;font-weight:700;font-size:12px}
.eprow .et{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eprow .ed{font-size:11px;color:var(--tx3);flex-shrink:0}
.eprow .tick{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.eprow .tick svg{width:13px;height:13px;stroke:transparent;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.eprow.watched .tick{background:var(--green);border-color:var(--green)}
.eprow.watched .tick svg{stroke:#0a0c11}
.eprow.future{opacity:.42}

/* ── episode detail ─────────────────────── */
.epmeta{font-size:12px;color:var(--tx3);margin-bottom:8px}
.epimg{width:100%;border-radius:12px;margin:4px 0 12px;aspect-ratio:16/9;object-fit:cover;background:var(--bg3)}
.eprating{display:flex;align-items:center;gap:6px;color:var(--gold);font-weight:800;font-size:15px;margin-bottom:4px}
.eprating svg{width:16px;height:16px;fill:var(--gold);stroke:none}
.epsum{font-size:13.5px;color:var(--tx2);line-height:1.65;margin:8px 0 6px}

/* ── modal / toast ──────────────────────── */
#modal{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.62);display:flex;align-items:flex-end;justify-content:center;animation:fadein .15s}
.mbox{
  background:var(--bg2);border:1px solid var(--line);border-radius:22px 22px 0 0;
  width:100%;max-width:640px;padding:22px 20px calc(26px + var(--sab));
  animation:slideup .22s cubic-bezier(.2,.8,.25,1);
  max-height:82vh;overflow-y:auto;
}
.mbox h3{margin-bottom:14px;font-size:17px;font-weight:800}
.mrow{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);font-size:14.5px;width:100%;text-align:left;font-weight:600}
.mrow:last-of-type{border-bottom:none}
.mrow svg{width:19px;height:19px;stroke:var(--tx2);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.mrow .md{margin-left:auto;font-size:12px;color:var(--tx3);text-align:right}
.minput{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--tx);outline:none;margin:6px 0 12px}
.minput:focus{border-color:var(--acc)}
.toast{
  position:fixed;bottom:calc(88px + var(--sab));left:50%;transform:translateX(-50%);
  background:var(--toastbg);border:1px solid var(--line2);color:var(--tx);
  padding:11px 18px;border-radius:26px;font-size:13.5px;font-weight:600;z-index:80;
  box-shadow:0 8px 28px rgba(0,0,0,.5);white-space:nowrap;
  display:flex;align-items:center;gap:14px;animation:toastin .2s cubic-bezier(.2,.8,.25,1);
  max-width:calc(100vw - 32px);
}
@keyframes toastin{from{transform:translate(-50%,12px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.toast .tmsg{overflow:hidden;text-overflow:ellipsis}
.toast button{color:var(--gold);font-weight:800;font-size:13px;letter-spacing:.4px;text-transform:uppercase;flex-shrink:0}
.note{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:13px 15px;font-size:13px;color:var(--tx2);margin-bottom:13px;line-height:1.6}

<script>
"use strict";
/* ============ Episotia — personal TV tracker ============ */
const APP_VERSION = "2.7.1";
const WHATS_NEW = "One-tap in-app updates, filter chips recenter when selected, search bars stay visible while scrolling and gained a clear button.";
const API = "https://api.tvmaze.com";
const LS_KEY = "episotia.v1";
const LS_OLD = "showtime.v1";
const STATUSES = {
  watching:      {label:"Watching"},
  up_to_date:    {label:"Up to date"},
  not_started_yet:{label:"Not started"},
  watch_later:   {label:"Watch later"},
  stopped:       {label:"Stopped"},
};
const I = {
  tv:'<svg viewBox="0 0 24 24"><rect x="3" y="6.5" width="18" height="13" rx="2.5"/><path d="m8.5 2.5 3.5 4 3.5-4"/></svg>',
  check:'<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>',
  x:'<svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  star:'<svg viewBox="0 0 24 24"><polygon points="12 2 15.1 8.3 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 8.9 8.3 12 2"/></svg>',
  back:'<svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>',
  down:'<svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 5-5m-5 5-5-5M4 21h16"/></svg>',
  up:'<svg viewBox="0 0 24 24"><path d="M12 21V9m0 0 5 5m-5-5-5 5M4 3h16"/></svg>',
  refresh:'<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.3"/><path d="M21 3v6h-6"/></svg>',
  trash:'<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>',
  search:'<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>',
  cloud:'<svg viewBox="0 0 24 24"><path d="M17.5 19a4.5 4.5 0 0 0 .42-8.98 7 7 0 0 0-13.36 1.9A4 4 0 0 0 6 19z"/></svg>',
  moon:'<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  clock:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  chat:'<svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.3 8.9 8.9 0 0 1-3.8-.8L3 20l1.1-5A8 8 0 0 1 3.5 11.5 8.4 8.4 0 0 1 12 3.2a8.4 8.4 0 0 1 9 8.3z"/></svg>',
};
let state = null;
let tab = "towatch";
let searchResults = [];
let lastSearchQ = "";
let searchAdded = {};
let currentSheetKey = null;

/* ---------- utils ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const stripHtml = s => String(s||"").replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtDate(a){
  if(!a) return "TBA";
  const d = new Date(a+"T12:00:00");
  return d.toLocaleDateString(undefined,{day:"numeric",month:"short",year: d.getFullYear()!==new Date().getFullYear()?"numeric":undefined});
}
function relDays(a){
  const ms = new Date(a+"T12:00:00") - new Date(todayStr()+"T12:00:00");
  const days = Math.round(ms/86400000);
  if(days===0) return "today";
  if(days===1) return "tomorrow";
  if(days<0) return Math.abs(days)+"d ago";
  if(days<30) return "in "+days+" days";
  const m = Math.round(days/30);
  return "in "+m+" month"+(m>1?"s":"");
}
function agoStr(ts){
  const d = Date.now()-ts;
  if(d<60000) return "just now";
  if(d<3600000) return Math.floor(d/60000)+"m ago";
  if(d<86400000) return Math.floor(d/3600000)+"h ago";
  if(d<7*86400000) return Math.floor(d/86400000)+"d ago";
  const dt = new Date(ts);
  return fmtDate(dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"));
}
function epCode(s,n){ return "S"+String(s).padStart(2,"0")+"E"+String(n).padStart(2,"0"); }
function redditUrl(sh, s, n){
  const alt = s+"x"+String(n).padStart(2,"0");
  return "https://www.google.com/search?q="+encodeURIComponent(`site:reddit.com ${sh.title} "${epCode(s,n)}" OR "${alt}" discussion`);
}
function toast(msg, ms=2400, action=null){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t = document.createElement("div");
  t.className = "toast";
  const span = document.createElement("span");
  span.className = "tmsg"; span.textContent = msg;
  t.appendChild(span);
  if(action){
    const b = document.createElement("button");
    b.textContent = action.label;
    b.onclick = () => { t.remove(); action.fn(); };
    t.appendChild(b);
  }
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), ms);
}
function save(){
  state.updatedAt = Date.now();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ toast("⚠️ Storage full — export a backup!"); }
  scheduleGistPush();
}

/* ---------- theme ---------- */
const mqLight = (typeof window!=="undefined" && window.matchMedia) ? window.matchMedia("(prefers-color-scheme: light)") : null;
function resolveTheme(){
  const pref = (state && state.settings && state.settings.theme) || "system";
  if(pref==="system") return (mqLight && mqLight.matches) ? "light" : "dark";
  return pref;
}
function applyTheme(){
  const mode = resolveTheme();
  document.documentElement.setAttribute("data-theme", mode);
  const mc = document.querySelector('meta[name="theme-color"]');
  if(mc) mc.content = mode==="light" ? "#f3f4f9" : "#0a0c11";
}
function openThemePicker(){
  const cur = state.settings.theme;
  const opts = [["system","System","Follows your phone"],["dark","Dark","Always dark"],["light","Light","Always light"]];
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>Theme</h3>
    ${opts.map(([k,label,desc])=>`<button class="mrow" onclick="setTheme('${k}')">${label}<span class="md">${cur===k?"✓ current":desc}</span></button>`).join("")}
    <button class="abtn" style="width:100%;margin-top:14px" onclick="openSettings()">‹ Back</button>
  </div>`;
  $("#modal").classList.remove("hidden");
  $("#modal").onclick = closeModal;
}
function setTheme(k){
  state.settings.theme = k;
  save(); applyTheme(); openSettings();
  toast("Theme: "+({system:"System",dark:"Dark",light:"Light"}[k]));
}
if(mqLight && mqLight.addEventListener) mqLight.addEventListener("change", () => {
  if(state && state.settings.theme==="system") applyTheme();
});

/* ---------- app self-update check ---------- */
let updateAvailable = null;
async function checkAppUpdate(){
  if(typeof location==="undefined" || !/^https?:$/.test(location.protocol)) return;
  try{
    const r = await fetch(location.href.split("?")[0], {cache:"no-store"});
    const t = await r.text();
    const m = t.match(/APP_VERSION = "([\d.]+)"/);
    if(m && m[1] !== APP_VERSION && !updateAvailable){ updateAvailable = m[1]; render(); }
  }catch(e){}
}
function reloadApp(){ location.replace(location.pathname + "?u=" + Date.now()); }

/* ---------- version ---------- */
function versionCheck(){
  if(state.appVersion !== APP_VERSION){
    const firstRun = !state.appVersion && !Object.keys(state.shows).length;
    state.appVersion = APP_VERSION;
    if(!firstRun) state.showWhatsNew = APP_VERSION;
    save();
  }
}
function dismissWhatsNew(){ state.showWhatsNew = null; save(); render(); }

/* ---------- state / seed ---------- */
function seedShowObj(d){ // d = {t,d,s,f,u,w} compact seed entry
  return {
    key:"db"+d.d, tvdbId:d.d, tvmazeId:null, title:d.t,
    status: d.s==="continuing" ? "watching" : d.s,
    fav: !!d.f, image:null, genres:[], network:"", runtime:null,
    premiered:null, tvStatus:"", eps:null, watched:{},
    seedUnwatched:d.u, seedWatched:d.w, seeded:false, lastSync:0
  };
}
function load(){
  let raw = localStorage.getItem(LS_KEY);
  if(!raw){ // migrate from pre-rename key
    raw = localStorage.getItem(LS_OLD);
    if(raw){ localStorage.setItem(LS_KEY, raw); localStorage.removeItem(LS_OLD); }
  }
  if(raw){ try{ state = JSON.parse(raw); }catch(e){ state = null; } }
  if(!state){
    state = { shows:{}, lastGlobalSync:0, createdAt:Date.now() };
    if(typeof SEED !== "undefined"){
      for(const s of SEED) state.shows["db"+s.d] = seedShowObj(s);
      if(SEED.length) save();
    }
  }
  state.settings = state.settings || {theme:"system"};
  state.updatedAt = state.updatedAt || Date.now();
}

/* ---------- derived ---------- */
function allShows(){ return Object.values(state.shows); }
function isFollowed(sh){ return sh.status !== "stopped"; }
function airedList(sh){
  if(!sh.eps) return [];
  const t = todayStr();
  return sh.eps.filter(e => e.s>=1 && e.a && e.a <= t);
}
function futureList(sh){
  if(!sh.eps) return [];
  const t = todayStr();
  return sh.eps.filter(e => e.s>=1 && e.a && e.a > t);
}
function wkey(e){ return e.s+"-"+e.n; }
function remaining(sh){ return airedList(sh).filter(e => !sh.watched[wkey(e)]).length; }
function nextUnwatched(sh){
  return airedList(sh).find(e => !sh.watched[wkey(e)]) || null;
}
function watchedCount(sh){
  if(sh.eps) return Object.keys(sh.watched).length;
  return sh.seedWatched || 0;
}
function totalRegular(sh){
  return sh.eps ? sh.eps.filter(e=>e.s>=1).length : (sh.seedWatched||0) + (sh.seedUnwatched?sh.seedUnwatched.length:0);
}
function autoStatus(sh, userAction=false){
  if(sh.status==="stopped" && !userAction) return; // manual choice, respect it unless the user acts
  if(!sh.eps) return;
  const rem = remaining(sh);
  const wc = Object.keys(sh.watched).length;
  if(wc===0){
    if(sh.status!=="watch_later") sh.status = "not_started_yet";
  } else {
    sh.status = rem===0 ? "up_to_date" : "watching";
  }
}
function deriveFromSeed(sh){
  if(sh.seeded || !sh.eps) return;
  const unw = new Set((sh.seedUnwatched||[]).map(p => p[0]+"-"+p[1]));
  const cutoff = sh.seedCutoff || ((typeof SEED_EXPORT_DATE!=="undefined") ? SEED_EXPORT_DATE : todayStr());
  for(const e of sh.eps){
    if(e.s>=1 && e.a && e.a <= cutoff && !unw.has(wkey(e))) sh.watched[wkey(e)] = 1;
  }
  sh.seeded = true;
  delete sh.seedUnwatched;
}

/* ---------- sync engine (TVmaze) ---------- */
let syncing = false;
async function apiGet(path){
  for(let att=0; att<4; att++){
    let r;
    try{ r = await fetch(API+path); }
    catch(e){ await sleep(2000*(att+1)); continue; }
    if(r.status===429){ await sleep(3000); continue; }
    if(r.status===404) return null;
    if(!r.ok){ await sleep(1500); continue; }
    return r.json();
  }
  throw new Error("network");
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));
function applyMeta(sh, d){
  sh.tvmazeId = d.id;
  sh.title = d.name || sh.title;
  sh.image = d.image ? d.image.medium : sh.image;
  sh.genres = d.genres || [];
  sh.network = (d.network && d.network.name) || (d.webChannel && d.webChannel.name) || "";
  sh.runtime = d.averageRuntime || d.runtime || sh.runtime;
  sh.premiered = d.premiered || null;
  sh.tvStatus = d.status || "";
}
function applyEps(sh, eps){
  sh.eps = eps.map(e => ({ s:e.season, n:e.number, t:e.name||"", a:e.airdate||null, r:e.runtime||null }));
  deriveFromSeed(sh);
  autoStatus(sh);
  sh.lastSync = Date.now();
}
async function syncShow(sh){
  if(!sh.tvmazeId){
    if(!sh.tvdbId) return false;
    const d = await apiGet("/lookup/shows?thetvdb="+sh.tvdbId);
    if(!d){ sh.lookupFailed = true; return false; }
    applyMeta(sh, d);
    await sleep(420);
  } else {
    const d = await apiGet("/shows/"+sh.tvmazeId);
    if(d) applyMeta(sh, d);
    await sleep(420);
  }
  const eps = await apiGet("/shows/"+sh.tvmazeId+"/episodes");
  if(eps) applyEps(sh, eps);
  return true;
}
function setSyncPill(txt){
  const p = $("#sync-pill");
  if(txt===null){ p.classList.remove("on"); return; }
  p.classList.add("on"); $("#sync-txt").textContent = txt;
}
async function syncAll(full=false){
  checkAppUpdate();
  if(syncing) return;
  syncing = true;
  const day = 86400000;
  let list = allShows().filter(sh => {
    if(!sh.tvmazeId) return !sh.lookupFailed || full;
    if(!sh.eps) return true;
    if(full) return true;
    if(sh.tvStatus==="Ended" && sh.seeded) return false;      // ended + already loaded: nothing new
    return Date.now() - sh.lastSync > day;                     // running shows: refresh daily
  });
  const prio = {watching:0, up_to_date:1, not_started_yet:2, watch_later:2, stopped:3};
  list.sort((a,b)=> (prio[a.status]??2)-(prio[b.status]??2));
  if(!list.length){ syncing=false; setSyncPill(null); toast("Everything is up to date ✓"); return; }
  let done=0, fails=0;
  for(const sh of list){
    setSyncPill(`Syncing ${done+1}/${list.length}`);
    try{ const ok = await syncShow(sh); if(!ok) fails++; }
    catch(e){ fails++; }
    done++;
    if(done%8===0){
      save();
      const ae = document.activeElement;           // don't wipe what the user is typing
      if(!ae || (ae.tagName!=="INPUT" && ae.tagName!=="TEXTAREA")) render();
    }
    await sleep(420);
  }
  state.lastGlobalSync = Date.now();
  save(); render();
  syncing=false; setSyncPill(null);
  toast(fails ? `Sync done — ${fails} show(s) need manual matching` : "Sync complete ✓");
}

/* ---------- cloud sync (GitHub Gist, optional) ---------- */
const GIST_FILE = "episotia-sync.json";
let gistPushTimer = null, applyingRemote = false;
function syncedState(){
  const c = JSON.parse(JSON.stringify(state));
  delete c.gist;                       // never let the token leave the device via backups/gist
  return c;
}
async function gistApi(method, path, body){
  const r = await fetch("https://api.github.com"+path, {
    method,
    headers: { "Authorization":"Bearer "+state.gist.token, "Accept":"application/vnd.github+json" },
    body: body ? JSON.stringify(body) : undefined
  });
  if(r.status===401 || r.status===403) throw new Error("auth");
  if(!r.ok) throw new Error("http"+r.status);
  return r.status===204 ? null : r.json();
}
function scheduleGistPush(){
  if(!state || !state.gist || !state.gist.token || applyingRemote) return;
  clearTimeout(gistPushTimer);
  gistPushTimer = setTimeout(gistPush, 3000);
}
async function gistPush(){
  if(!state.gist || !state.gist.token || !state.gist.id) return;
  try{
    await gistApi("PATCH", "/gists/"+state.gist.id, { files: { [GIST_FILE]: { content: JSON.stringify(syncedState()) } } });
    state.gist.lastPush = Date.now();
    localStorage.setItem(LS_KEY, JSON.stringify(state)); // persist lastPush without re-scheduling
  }catch(e){
    if(e.message==="auth") toast("Cloud sync: token invalid — reconnect in Settings", 4000);
  }
}
async function gistPull(){
  if(!state.gist || !state.gist.token || !state.gist.id) return;
  try{
    const g = await gistApi("GET", "/gists/"+state.gist.id);
    const f = g.files && g.files[GIST_FILE];
    if(!f || !f.content) return;
    const remote = JSON.parse(f.content);
    if((remote.updatedAt||0) > (state.updatedAt||0)){
      applyingRemote = true;
      const gist = state.gist;
      state = remote;
      state.gist = gist;
      state.settings = state.settings || {theme:"system"};
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      applyingRemote = false;
      applyTheme(); render();
      toast("Synced from cloud ☁", 2000);
    } else if((state.updatedAt||0) > (remote.updatedAt||0)){
      scheduleGistPush();
    }
  }catch(e){
    if(e.message==="auth") toast("Cloud sync: token invalid — reconnect in Settings", 4000);
  }
}
function openSyncSetup(){
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>Cloud sync (via GitHub)</h3>
    <div class="note">Auto-saves your library to a <b>private gist</b> in your own GitHub account, and keeps all your devices in sync. One-time setup:<br><br>
    1. Create a free account at <b>github.com</b> (if you don't have one).<br>
    2. Open <b>github.com/settings/personal-access-tokens</b> → Generate new token.<br>
    3. Any name, expiration <b>No expiration</b>, and under <b>Account permissions → Gists</b> choose <b>Read and write</b>. Generate & copy.<br>
    4. Paste the token below. Repeat only step 4 on your other devices.</div>
    <input id="gtoken" class="minput" placeholder="Paste token (github_pat_… or ghp_…)" autocomplete="off">
    <button class="abtn primary" style="width:100%" onclick="connectGist()">Connect</button>
  </div>`;
  $("#modal").classList.remove("hidden");
  $("#modal").onclick = closeModal;
}
async function connectGist(){
  const token = $("#gtoken").value.trim();
  if(!token) return;
  state.gist = {token, id:null};
  toast("Connecting…", 8000);
  try{
    const list = await gistApi("GET","/gists?per_page=100");
    const mine = (list||[]).find(g => g.files && g.files[GIST_FILE]);
    if(mine){
      state.gist.id = mine.id;
      const g = await gistApi("GET","/gists/"+mine.id);
      let remote = null;
      try{ remote = JSON.parse(g.files[GIST_FILE].content||"{}"); }catch(e){}
      if(remote && remote.shows){
        const rn = Object.keys(remote.shows).length, ln = Object.keys(state.shows).length;
        if(confirm(`Found cloud data (${rn} shows). Load it on this device?\n\nOK = use cloud data here\nCancel = overwrite cloud with this device (${ln} shows)`)){
          applyingRemote = true;
          const gist = state.gist;
          state = remote; state.gist = gist;
          state.settings = state.settings || {theme:"system"};
          applyingRemote = false;
        }
      }
    } else {
      const g = await gistApi("POST","/gists",{ description:"Episotia sync data", public:false, files:{ [GIST_FILE]:{ content: JSON.stringify(syncedState()) } } });
      state.gist.id = g.id;
    }
    save();
    closeModal(); applyTheme(); render();
    toast("Cloud sync connected ✓", 3000);
  }catch(e){
    state.gist = null; save();
    toast(e.message==="auth" ? "Token rejected — check it has Gists: read & write" : "Connection failed — try again", 4000);
  }
}
function disconnectGist(){
  if(!confirm("Disconnect cloud sync on this device?\n(Your data stays here, and the gist stays in your GitHub account.)")) return;
  state.gist = null; save(); openSettings();
}

/* ---------- TVmaze unmatched fixer ---------- */
function unmatchedList(){ return allShows().filter(sh => !sh.eps && sh.lookupFailed); }
let matchResults = [], matchKey = null;
function openUnmatched(){
  const list = unmatchedList();
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>Not matched on TVmaze (${list.length})</h3>
    <div style="max-height:52vh;overflow-y:auto">
    ${list.map(sh=>`<button class="mrow" onclick="findMatch('${sh.key}')">${esc(sh.title)}<span class="md">Find match ›</span></button>`).join("") || '<div class="note">All shows matched 🎉</div>'}
    </div>
    <div class="note" style="margin-top:12px">TVmaze has no automatic link for these TVDB entries. Tap one to search by name and pick the right show. If it truly isn't on TVmaze, you can <b>remove it</b> in My Shows (its episode count still counts in your stats).</div>
  </div>`;
  $("#modal").classList.remove("hidden");
  $("#modal").onclick = closeModal;
}
async function findMatch(key){
  const sh = state.shows[key];
  matchKey = key;
  toast("Searching…", 1200);
  try{ matchResults = await apiGet("/search/shows?q="+encodeURIComponent(sh.title)) || []; }
  catch(e){ toast("Network error — try again"); return; }
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>Match “${esc(sh.title)}”</h3>
    <div style="max-height:52vh;overflow-y:auto">
    ${matchResults.map((r,i)=>{
      const d = r.show;
      return `<button class="mrow" onclick="linkMatch(${i})">${esc(d.name)}<span class="md">${d.premiered?d.premiered.slice(0,4):"?"} · ${esc((d.network&&d.network.name)||(d.webChannel&&d.webChannel.name)||"")}</span></button>`;
    }).join("") || '<div class="note">No results — this show may not exist on TVmaze.</div>'}
    </div>
    <button class="abtn" style="width:100%;margin-top:12px" onclick="openUnmatched()">‹ Back to list</button>
  </div>`;
}
async function linkMatch(i){
  const sh = state.shows[matchKey];
  const d = matchResults[i] && matchResults[i].show;
  if(!sh || !d) return;
  applyMeta(sh, d);
  delete sh.lookupFailed;
  save();
  toast(`Linked to ${d.name} — loading episodes…`);
  try{ const eps = await apiGet("/shows/"+d.id+"/episodes"); if(eps){ applyEps(sh, eps); save(); } }
  catch(e){}
  openUnmatched(); render();
}
function dismissUnmatched(){
  state.unmatchedDismissed = true; save(); render();
  toast("Hidden — fix them anytime in Settings");
}

/* ---------- actions + undo ---------- */
let undoData = null;
function registerUndo(showKey, keys, msg){
  if(!keys.length) return;
  undoData = {showKey, keys};
  toast(msg, 6000, {label:"Undo", fn:undoLast});
}
function undoLast(){
  if(!undoData) return;
  const sh = state.shows[undoData.showKey];
  if(sh){
    for(const k of undoData.keys) delete sh.watched[k];
    autoStatus(sh, true);
    save();
  }
  undoData = null;
  if(currentSheetKey && !$("#sheet").classList.contains("hidden")) renderSheet(currentSheetKey);
  render();
  toast("Undone ↩");
}
function markWatched(sh, e, on=true){
  if(on) sh.watched[wkey(e)] = Date.now(); else delete sh.watched[wkey(e)];
  autoStatus(sh, true);
  save();
}
function markSeason(sh, season){
  const t = todayStr(), added = [];
  for(const e of sh.eps){
    if(e.s===season && e.a && e.a<=t && !sh.watched[wkey(e)]){
      sh.watched[wkey(e)] = Date.now(); added.push(wkey(e));
    }
  }
  autoStatus(sh, true); save();
  registerUndo(sh.key, added, `Season ${season}: ${added.length} marked ✓`);
}
function markAll(sh){
  const added = [];
  for(const e of airedList(sh)){
    if(!sh.watched[wkey(e)]){ sh.watched[wkey(e)] = Date.now(); added.push(wkey(e)); }
  }
  autoStatus(sh, true); save();
  registerUndo(sh.key, added, `${added.length} episodes marked ✓`);
}

/* ---------- rendering ---------- */

  else if(tab==="upcoming") m.innerHTML = viewUpcoming();
  else if(tab==="shows") m.innerHTML = viewShows();

  document.querySelectorAll("#main .chips").forEach(row => {
    const act = row.querySelector && row.querySelector(".chip.act");
    if(act && row.scrollTo) row.scrollTo({left: act.offsetLeft - (row.clientWidth - act.offsetWidth)/2, behavior:"smooth"});

function updateBadge(){
  const n = allShows().filter(sh=>sh.status==="watching"&&sh.eps&&remaining(sh)>0).length;

function favBadge(sh){ return sh.fav ? `<span class="titlefav">${I.star}</span>` : ""; }

  if(!items.length) h += `<div class="empty"><div class="big">🎉</div>Nothing to watch here.<br>You're all caught up!</div>`;
  for(const sh of items){

        <div class="meta">aired ${fmtDate(e.a)}${sh.network?" · "+esc(sh.network):""}</div>
        <div class="progress"><i style="width:${tot?Math.round(wc/tot*100):0}%"></i></div>
      </div>
      <div>
        <button class="check-btn" onclick="quickWatch('${sh.key}')" aria-label="Mark watched">${I.check}</button>
        <div class="left-num">${rem} left</div>

function viewHistory(){
  const hist = [];
  for(const sh of allShows()){
    for(const [k,ts] of Object.entries(sh.watched)){
      if(ts>1) hist.push({sh, k, ts});
    }
  }
  hist.sort((a,b)=>b.ts-a.ts);
  if(!hist.length) return `<div class="empty"><div class="big">🕐</div>Episodes you mark as watched<br>will appear here.<br><br><span style="font-size:12px">(Your imported TV Time history has no<br>timestamps, so it starts fresh from today.)</span></div>`;
  let h = "";
  for(const {sh,k,ts} of hist.slice(0,150)){
    const [s,n] = k.split("-").map(Number);
    const ep = sh.eps ? sh.eps.find(e=>e.s===s&&e.n===n) : null;
    h += `<div class="hrow">
      ${sh.image?`<img class="hposter" src="${esc(sh.image)}" loading="lazy" alt="">`:`<div class="hposter poster ph">${I.tv}</div>`}
      <div class="hinfo" onclick="openShow('${sh.key}')">
        <div class="ht">${esc(sh.title)}</div>
        <div class="hs"><span class="epcode">${epCode(s,n)}</span>${ep&&ep.t?" · "+esc(ep.t):""}</div>
      </div>
      <div class="hd">${agoStr(ts)}</div>
      <button class="unmark" onclick="unmarkHistory('${sh.key}','${k}')" aria-label="Un-mark">${I.x}</button>
    </div>`;
  }
  return h;
}
function unmarkHistory(showKey, k){
  const sh = state.shows[showKey];
  if(!sh) return;
  delete sh.watched[k];
  autoStatus(sh, true); save(); render();
  toast("Removed from history");
}
function viewUpcoming(){
  const t = todayStr();
  const rows = [];
  for(const sh of allShows()){
    if(!isFollowed(sh)) continue;
    for(const e of futureList(sh)) rows.push({sh, e});
  }
  rows.sort((a,b)=> a.e.a < b.e.a ? -1 : a.e.a > b.e.a ? 1 : 0);
  const soon = rows.filter(r => (new Date(r.e.a) - new Date(t)) < 120*86400000);
  if(!soon.length) return `<div class="empty"><div class="big">📅</div>No scheduled episodes in the next months.<br>New dates appear after each sync.</div>`;
  let h = "", lastDate = "";
  for(const {sh,e} of soon){
    if(e.a !== lastDate){
      lastDate = e.a;
      h += `<div class="daylabel">${fmtDate(e.a)}<small>${relDays(e.a)}</small></div>`;
    }
    h += `<div class="card">
      ${posterImg(sh)}
      <div class="info" onclick="openShow('${sh.key}')">
        <div class="title">${esc(sh.title)}${favBadge(sh)}</div>
        <div class="sub"><span class="epcode">${epCode(e.s,e.n)}</span> · ${esc(e.t||"TBA")}</div>
        <div class="meta">${sh.network?esc(sh.network):""}</div>
      </div>
    </div>`;
  }
  return h;
}
let showFilter = "all", showQuery = "";
function viewShows(){
  let items = allShows();

  items.sort((a,b)=>a.title.localeCompare(b.title));

  let h = `<div class="searchbar"><div class="inputwrap"><input id="show-q" placeholder="Filter my ${allShows().length} shows…" value="${esc(showQuery)}" oninput="showQuery=this.value;renderKeepFocus('show-q')">${showQuery?`<button class="clearbtn" onclick="showQuery='';render()">✕</button>`:""}</div></div>

      ${sh.fav ? `<div class="fav">${I.star}</div>` : ""}

function viewStats(){
  const shows = allShows();
  let eps = 0, mins = 0, newThisMonth = 0;
  const now = new Date(); const mStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  const perShow = [], genreMin = {};
  for(const sh of shows){
    const wc = watchedCount(sh);
    eps += wc;
    const rt = sh.runtime || 40;
    mins += wc*rt;
    perShow.push([sh.title, wc]);
    for(const g of (sh.genres||[])) genreMin[g] = (genreMin[g]||0) + wc;
    for(const v of Object.values(sh.watched)) if(v>1 && v>=mStart) newThisMonth++;
  }
  const days = Math.floor(mins/1440), hrs = Math.floor(mins%1440/60);
  const counts = {};
  for(const s of shows) counts[s.status] = (counts[s.status]||0)+1;
  perShow.sort((a,b)=>b[1]-a[1]);
  const topShows = perShow.slice(0,8).filter(x=>x[1]>0);
  const topGenres = Object.entries(genreMin).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxS = topShows[0] ? topShows[0][1] : 1, maxG = topGenres[0] ? topGenres[0][1] : 1;
  return `
  <div class="statgrid">
    <div class="stat-card"><div class="v">${eps.toLocaleString()}</div><div class="l">Episodes watched</div></div>
    <div class="stat-card"><div class="v">${days}<span style="font-size:15px">d</span> ${hrs}<span style="font-size:15px">h</span></div><div class="l">Time spent</div></div>
    <div class="stat-card"><div class="v">${shows.length}</div><div class="l">Shows tracked</div></div>
    <div class="stat-card"><div class="v">${newThisMonth}</div><div class="l">Eps this month</div></div>
  </div>
  <h2 class="sec">By status</h2>
  ${Object.entries(STATUSES).map(([k,v])=>{
    const n = counts[k]||0;
    return `<div class="bar-row"><div class="bl">${v.label}</div><div class="bt"><i style="width:${shows.length?n/shows.length*100:0}%"></i></div><div class="bv">${n}</div></div>`;
  }).join("")}
  <h2 class="sec">Per year</h2>
  ${(()=>{
    const yrs = {};
    let undatedN = 0;
    for(const sh of shows) for(const v of Object.values(sh.watched||{})){
      if(v>1) { const y = new Date(v).getFullYear(); yrs[y]=(yrs[y]||0)+1; } else undatedN++;
    }
    const ents = Object.entries(yrs).sort((a,b)=>b[0]-a[0]);
    if(!ents.length) return '<div class="empty">No dated episodes yet.</div>';
    const maxY = Math.max(...ents.map(e=>e[1]));
    return ents.map(([y,n])=>`<div class="bar-row"><div class="bl">${y}</div><div class="bt"><i style="width:${n/maxY*100}%"></i></div><div class="bv">${n}</div></div>`).join("")
      + (undatedN?`<div class="epmeta" style="margin-top:6px">${undatedN} episodes without a date are not shown.</div>`:"");
  })()}
  <h2 class="sec">Most watched</h2>
  ${topShows.map(([t,n])=>`<div class="bar-row"><div class="bl">${esc(t)}</div><div class="bt"><i style="width:${n/maxS*100}%"></i></div><div class="bv">${n}</div></div>`).join("") || '<div class="empty">Sync first to see this.</div>'}
  <h2 class="sec">Top genres</h2>
  ${topGenres.map(([g,n])=>`<div class="bar-row"><div class="bl">${esc(g)}</div><div class="bt"><i style="width:${n/maxG*100}%"></i></div><div class="bv">${n}</div></div>`).join("") || '<div class="empty">Sync first to see this.</div>'}`;
}
function viewSearch(){

/* ---------- show detail sheet ---------- */
let openSeasons = {};
function openShow(key){
  const sh = state.shows[key];
  if(!sh) return;
  currentSheetKey = key;
  openSeasons = {};
  const nx = sh.eps && nextUnwatched(sh);
  if(nx) openSeasons[nx.s] = true;
  renderSheet(key);
  $("#sheet").classList.remove("hidden");
  window.scrollTo(0,0);
}
function closeSheet(){ $("#sheet").classList.add("hidden"); currentSheetKey = null; render(); }
function renderSheet(key){
  const sh = state.shows[key];
  const wc = watchedCount(sh), tot = totalRegular(sh);
  const pct = tot ? Math.round(wc/tot*100) : 0;
  let seasonsHtml = "";
  if(sh.eps){
    const bySeason = {};
    for(const e of sh.eps){ if(e.s>=1) (bySeason[e.s] = bySeason[e.s]||[]).push(e); }
    const t = todayStr();
    for(const sn of Object.keys(bySeason).map(Number).sort((a,b)=>a-b)){
      const eps = bySeason[sn];
      const w = eps.filter(e=>sh.watched[wkey(e)]).length;
      const open = !!openSeasons[sn];
      seasonsHtml += `<div class="season ${open?"open":""}">
        <div class="season-h" onclick="toggleSeason('${key}',${sn})">
          <span class="caret">▶</span><span class="sn">Season ${sn}</span>
          ${w<eps.filter(e=>e.a&&e.a<=t).length?`<button class="season-mark" onclick="event.stopPropagation();markSeasonUi('${key}',${sn})">MARK ALL</button>`:""}
          <span class="sc">${w}/${eps.length}</span>
        </div>
        ${open ? eps.map(e=>{
          const future = !e.a || e.a > t;
          const on = !!sh.watched[wkey(e)];
          return `<div class="eprow ${on?"watched":""} ${future?"future":""}" onclick="openEpisode('${key}',${e.s},${e.n})">
            <span class="en">${e.n}</span><span class="et">${esc(e.t||"Episode "+e.n)}</span>
            <span class="ed">${e.a?fmtDate(e.a):"TBA"}</span>
            <span class="tick" onclick="event.stopPropagation();${future?"":`toggleEp('${key}',${e.s},${e.n})`}">${I.check}</span>
          </div>`;
        }).join("") : ""}
      </div>`;
    }
  } else if(sh.lookupFailed){
    seasonsHtml = `<div class="note">This show couldn't be matched on TVmaze automatically.</div>
      <button class="abtn primary" style="width:100%" onclick="findMatch('${key}');$('#modal').classList.remove('hidden');$('#modal').onclick=closeModal">Find the right match</button>`;
  } else {
    seasonsHtml = `<div class="note">Episode list not loaded yet. <b>Sync</b> to load it.</div>
      <button class="abtn primary" style="width:100%" onclick="loadOne('${key}')">Load episodes now</button>`;
  }
  const metaBits = [
    sh.network ? esc(sh.network) : "",
    sh.tvStatus ? (sh.tvStatus==="Ended" ? "Ended" : esc(sh.tvStatus)) : "",
    sh.premiered ? sh.premiered.slice(0,4) : "",
    sh.runtime ? sh.runtime+" min" : ""
  ].filter(Boolean).join(" · ");
  $("#sheet").innerHTML = `
  <div class="hero">
    ${sh.image?`<div class="hbg" style="background-image:url('${esc(sh.image)}')"></div>`:`<div class="hbg" style="background:var(--bg3)"></div>`}
    <div class="hgrad"></div>
    <button class="icon-btn hback" onclick="closeSheet()" aria-label="Back">${I.back}</button>
    <button class="icon-btn hfav ${sh.fav?"on":""}" onclick="toggleFav('${key}')" aria-label="Favorite">${I.star}</button>
  </div>
  <div class="dwrap">
    <div class="dtop">
      ${sh.image?`<img src="${esc(sh.image)}" alt="">`:`<div class="dph">${I.tv}</div>`}
      <div class="dhead">
        <div class="dtitle">${esc(sh.title)}${favBadge(sh)}</div>
        <div class="dmeta">${metaBits}${(sh.genres&&sh.genres.length)?"<br>"+sh.genres.slice(0,3).map(esc).join(" · "):""}</div>
      </div>
    </div>
    <div class="dprog">
      <div class="dpr"><span><b>${wc}</b> / ${tot} episodes</span><span>${pct}%</span></div>
      <div class="progress"><i class="${tot&&wc>=tot?"full":""}" style="width:${pct}%"></i></div>
    </div>
    <div class="statusrow">
      ${Object.entries(STATUSES).map(([k,v])=>
        `<button class="chip ${sh.status===k?"act":""}" onclick="setStatus('${key}','${k}')">${v.label}</button>`).join("")}
    </div>
    <div class="actions">
      ${sh.eps&&remaining(sh)>0?`<button class="abtn primary" onclick="markAllUi('${key}')">✓ Mark all watched</button>`:""}
      <button class="abtn" style="color:var(--red)" onclick="removeShow('${key}')">Remove</button>
    </div>
    ${seasonsHtml}
  </div>`;
}
function markAllUi(key){ markAll(state.shows[key]); renderSheet(key); }
function markSeasonUi(key, sn){ markSeason(state.shows[key], sn); renderSheet(key); }
function toggleSeason(key, sn){ openSeasons[sn] = !openSeasons[sn]; renderSheet(key); }
function toggleEp(key, s, n){
  const sh = state.shows[key];
  const e = sh.eps.find(x=>x.s===s&&x.n===n);
  markWatched(sh, e, !sh.watched[wkey(e)]);
  renderSheet(key);
}
function toggleFav(key){ const sh=state.shows[key]; sh.fav=!sh.fav; save(); renderSheet(key); }
function setStatus(key, st){
  const sh = state.shows[key];
  sh.status = st; save(); renderSheet(key);
}
function removeShow(key){
  const sh = state.shows[key];
  if(!confirm(`Remove "${sh.title}" and its watch history?`)) return;
  delete state.shows[key]; save(); closeSheet();
}
async function loadOne(key){
  const sh = state.shows[key];
  toast("Loading…");
  try{ await syncShow(sh); save(); renderSheet(key); }
  catch(e){ toast("Network error — try again"); }
}
function quickWatch(key){
  const sh = state.shows[key];
  const e = nextUnwatched(sh);
  if(!e) return;
  const k = wkey(e);
  sh.watched[k] = Date.now();
  autoStatus(sh, true); save();
  registerUndo(sh.key, [k], `✓ ${sh.title} ${epCode(e.s,e.n)}`);
  render();
}

/* ---------- episode detail ---------- */
let epCache = null;
async function openEpisode(key, s, n){
  const sh = state.shows[key];
  if(!sh) return;
  epCache = null;
  const local = sh.eps ? sh.eps.find(e=>e.s===s&&e.n===n) : null;
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>${esc((local&&local.t)||epCode(s,n))}</h3>
    <div class="note">Loading episode details…</div>
  </div>`;
  $("#modal").classList.remove("hidden");
  $("#modal").onclick = closeModal;
  if(sh.tvmazeId){
    try{ epCache = await apiGet(`/shows/${sh.tvmazeId}/episodebynumber?season=${s}&number=${n}`); }
    catch(e){}
  }
  renderEpisode(key, s, n);
}
function renderEpisode(key, s, n){
  const sh = state.shows[key];
  const d = epCache;
  const local = sh.eps ? sh.eps.find(e=>e.s===s&&e.n===n) : null;
  const on = !!sh.watched[s+"-"+n];
  const title = (d&&d.name) || (local&&local.t) || "Episode "+n;
  const air = (d&&d.airdate) || (local&&local.a) || null;
  const run = (d&&d.runtime) || (local&&local.r) || null;
  const rating = d && d.rating && d.rating.average;
  const img = d && d.image && (d.image.original || d.image.medium);
  const sum = stripHtml(d && d.summary);
  const future = !air || air > todayStr();
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>${esc(title)}</h3>
    <div class="epmeta"><span class="epcode">${epCode(s,n)}</span> · ${esc(sh.title)}${air?" · "+fmtDate(air):" · TBA"}${run?" · "+run+" min":""}</div>
    ${img?`<img class="epimg" src="${esc(img)}" alt="">`:""}
    ${rating?`<div class="eprating">${I.star}${Number(rating).toFixed(1)}<span style="color:var(--tx3);font-weight:600;font-size:12px">/10 · TVmaze community</span></div>`:""}
    ${sum?`<div class="epsum">${esc(sum)}</div>`:`<div class="epsum" style="color:var(--tx3)">${future?"Not aired yet.":"No description available."}</div>`}
    ${on&&sh.watched[s+"-"+n]>1?`<div class="epmeta" style="color:var(--green);font-weight:700">✓ Watched ${fmtDate(new Date(sh.watched[s+"-"+n]).toISOString().slice(0,10))}</div>`:(on?`<div class="epmeta" style="color:var(--green);font-weight:700">✓ Watched (date unknown)</div>`:"")}
    <div class="actions" style="margin:10px 0 0">
      ${future?"":`<button class="abtn ${on?"":"primary"}" onclick="toggleEpModal('${key}',${s},${n})">${on?"Unmark watched":"✓ Mark watched"}</button>`}
      ${d&&d.url?`<button class="abtn" onclick="window.open('${esc(d.url)}','_blank')">TVmaze</button>`:""}
      <button class="abtn" onclick="window.open(redditUrl(state.shows['${key}'],${s},${n}),'_blank')">Reddit</button>
    </div>
  </div>`;
}
function toggleEpModal(key, s, n){
  const sh = state.shows[key];
  const e = (sh.eps||[]).find(x=>x.s===s&&x.n===n) || {s, n};
  markWatched(sh, e, !sh.watched[s+"-"+n]);
  if(currentSheetKey && !$("#sheet").classList.contains("hidden")) renderSheet(currentSheetKey);
  renderEpisode(key, s, n);
}

/* ---------- search / add ---------- */
async function doSearch(){
  const q = $("#q").value.trim();
  if(!q) return;
  lastSearchQ = q;
  toast("Searching…",1200);
  try{
    searchResults = await apiGet("/search/shows?q="+encodeURIComponent(q)) || [];
    render();

  }catch(e){ toast("Network error"); }
}
async function addShow(tvmazeId){
  const r = searchResults.find(x=>x.show.id===tvmazeId);
  if(!r) return;
  const d = r.show;
  const key = "tv"+d.id;
  if(state.shows[key]) return;
  const sh = { key, tvdbId:(d.externals&&d.externals.thetvdb)||null, tvmazeId:null, title:d.name,
    status:"not_started_yet", fav:false, image:null, genres:[], network:"", runtime:null,
    premiered:null, tvStatus:"", eps:null, watched:{}, seeded:true, lastSync:0 };
  applyMeta(sh, d);
  state.shows[key] = sh;
  searchAdded[d.id] = true;
  save(); render();
  toast(`Added ${d.name} — loading episodes…`);
  try{ const eps = await apiGet("/shows/"+d.id+"/episodes"); if(eps){ applyEps(sh, eps); save(); render(); } }
  catch(e){}
}

/* ---------- settings / backup / import ---------- */
function openSettings(){
  const kb = Math.round((localStorage.getItem(LS_KEY)||"").length/1024);
  const themeLabel = {system:"System", dark:"Dark", light:"Light"}[state.settings.theme] || "System";
  const gistOn = state.gist && state.gist.token;
  $("#modal").innerHTML = `<div class="mbox" onclick="event.stopPropagation()">
    <h3>Settings</h3>
    <button class="mrow" onclick="openThemePicker()">${I.moon}Theme<span class="md">${themeLabel} ›</span></button>
    ${gistOn
      ? `<button class="mrow" onclick="disconnectGist()">${I.cloud}Cloud sync: on ✓<span class="md">${state.gist.lastPush?"saved "+agoStr(state.gist.lastPush):"tap to disconnect"}</span></button>`
      : `<button class="mrow" onclick="openSyncSetup()">${I.cloud}Set up cloud sync<span class="md">recommended</span></button>`}
    <button class="mrow" onclick="exportBackup()">${I.down}Export backup (JSON)<span class="md">${kb} KB</span></button>
    <button class="mrow" onclick="document.getElementById('imp').click()">${I.up}Import backup / TV Time export<span class="md">.json / .html</span></button>
    ${unmatchedList().length?`<button class="mrow" onclick="openUnmatched()">${I.search}Fix unmatched shows<span class="md">${unmatchedList().length}</span></button>`:""}
    <button class="mrow" onclick="closeModal();syncAll(true)">${I.refresh}Full re-sync (all shows)</button>
    <button class="mrow" style="color:var(--red)" onclick="resetAll()">${I.trash}Reset all data</button>
    <div class="note" style="margin-top:14px">${gistOn?"Cloud sync is on: your library auto-saves to your private gist and follows you across devices.":"Your data lives only in this browser, on this device. Set up cloud sync (or export backups) so you never lose progress."} Import also accepts a <b>TV Time export</b> (.html from the "TV Time Out" Chrome extension).<div style="margin-top:8px;color:var(--tx3);font-size:11.5px">Episotia v${APP_VERSION}</div></div>
    <input type="file" id="imp" accept=".json,.html,.htm,application/json,text/html" class="hidden" onchange="importFile(this.files[0])">
  </div>`;
  $("#modal").classList.remove("hidden");
  $("#modal").onclick = closeModal;
}
function closeModal(){ $("#modal").classList.add("hidden"); }
function exportBackup(){
  const blob = new Blob([JSON.stringify(syncedState())], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "episotia-backup-"+todayStr()+".json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
function importFile(file){
  if(!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    const txt = fr.result;
    if(/var SHOWS\s*=/.test(txt)){ importTvTime(txt); return; }
    try{
      const s = JSON.parse(txt);
      if(!s.shows) throw 0;
      const gist = state.gist;              // keep this device's sync connection
      state = s;
      if(gist) state.gist = gist;
      state.settings = state.settings || {theme:"system"};
      save(); closeModal(); applyTheme(); render();
      toast("Backup imported ✓");
      setTimeout(()=>syncAll(false), 800);
    }catch(e){ toast("Not a valid backup or TV Time export"); }
  };
  fr.readAsText(file);
}
function importTvTime(html){
  const m = html.match(/var SHOWS\s*=\s*(\[[\s\S]*?\]);/);
  if(!m){ toast("No TV Time show data found in this file"); return; }
  let list;
  try{ list = JSON.parse(m[1]); }catch(e){ toast("Couldn't parse the TV Time export"); return; }
  const dm = html.match(/(\d{4}-\d{2}-\d{2})/);
  const cutoff = dm ? dm[1] : todayStr();
  let added = 0;
  for(const s of list){
    if(!s.tvdbId) continue;
    const key = "db"+s.tvdbId;
    if(state.shows[key]) continue;
    const sh = seedShowObj({
      t: s.title || ("TVDB "+s.tvdbId), d: s.tvdbId,
      s: s.status || "not_started_yet", f: s.isFavorite ? 1 : 0,
      u: (s.unwatchedRegularEps||[]).map(e=>[e.season, e.episode]),
      w: s.watched || 0
    });
    sh.seedCutoff = cutoff;
    state.shows[key] = sh;
    added++;
  }
  save(); closeModal(); render();
  toast(added + " shows imported — syncing…");
  setTimeout(()=>syncAll(false), 800);
}
function resetAll(){
  if(!confirm("Delete ALL data on this device? Export a backup first!")) return;
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* ---------- swipe gestures (To Watch) ---------- */
let sw = null;
if(typeof document!=="undefined" && document.addEventListener){
  document.addEventListener("touchstart", e => {
    const card = e.target.closest && e.target.closest(".card.swipeable");
    if(!card) return;
    sw = {card, key:card.dataset.key, x:e.touches[0].clientX, y:e.touches[0].clientY, dx:0, on:false};
  }, {passive:true});
  document.addEventListener("touchmove", e => {
    if(!sw) return;
    const dx = e.touches[0].clientX - sw.x, dy = e.touches[0].clientY - sw.y;
    if(!sw.on){
      if(Math.abs(dx)>14 && Math.abs(dx)>Math.abs(dy)*1.4){ sw.on = true; sw.card.classList.add("dragging"); }
      else if(Math.abs(dy)>14){ sw = null; return; }
    }
    if(sw && sw.on){
      e.preventDefault();
      sw.dx = Math.max(-140, Math.min(140, dx));
      sw.card.style.transform = "translateX("+sw.dx+"px)";
      const wrap = sw.card.parentElement;
      const bw = wrap && wrap.querySelector(".sb-watch"), bl = wrap && wrap.querySelector(".sb-later");
      if(bw){ bw.style.opacity = sw.dx<0 ? Math.min(1, -sw.dx/80) : 0; bw.classList.toggle("armed", sw.dx<-70); }
      if(bl){ bl.style.opacity = sw.dx>0 ? Math.min(1, sw.dx/80) : 0; bl.classList.toggle("armed", sw.dx>70); }
    }
  }, {passive:false});
  document.addEventListener("touchend", () => {
    if(!sw) return;
    const {card, key, dx, on} = sw;
    card.classList.remove("dragging");
    card.style.transform = "";
    const wrap0 = card.parentElement;
    if(wrap0) wrap0.querySelectorAll(".swipe-bg").forEach(b=>{ b.style.opacity = 0; b.classList.remove("armed"); });
    sw = null;
    if(!on) return;
    if(dx < -70) quickWatch(key);                     // swipe left = mark watched
    else if(dx > 70){                                  // swipe right = watch later
      const s = state.shows[key];
      if(s && s.status !== "watch_later"){
        const prev = s.status;
        s.status = "watch_later"; save(); render();
        toast(`${s.title} → Watch later`, 5000, {label:"Undo", fn:()=>{ s.status = prev; save(); render(); }});
      }
    }
  }, {passive:true});
}

/* ---------- boot ---------- */
load();
applyTheme();
versionCheck();
document.querySelectorAll("nav button").forEach(b => b.onclick = () => { tab = b.dataset.tab; render(); });
$("#btn-sync").onclick = () => syncAll(false);
$("#btn-settings").onclick = openSettings;
render();
if(state.gist && state.gist.token) gistPull();
// first run: start syncing automatically; later: refresh if stale (>20h)
const stale = allShows().length && (Date.now() - (state.lastGlobalSync||0) > 20*3600000);
if(stale) setTimeout(()=>syncAll(false), 800);
setTimeout(checkAppUpdate, 1500);

</script>
